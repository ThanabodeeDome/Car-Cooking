<!doctype html>
<html lang="th">

    <link rel="stylesheet" href="navbar.css" />

    <link

      rel="stylesheet"
    />
  </head>
  <body class="booking-page">
    <nav class="nav-bar">
      <div class="logo">
        <img src="assets/image/CH2.png" alt="nav-logo" />
      </div>

      <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>

      <ul class="nav-links" id="nav-list"> 
        <li>
          <a href="homepage.html" class="Home-btn">หน้าหลัก</a>
        </li>
        <li>
          <a href="booking.html" class="book-btn">จองรอบขับ</a>
        </li>
        <li>
          <a href="car-status.html" class="Check-btn">เช็กคิว</a>
        </li>
        <li>
          <a href="car-details.html" class="info-btn">รายละเอียดรถยนต์</a>

        <li>

        </li>
      </ul>

      <section class="car-section">

      <div class="main-content-wrapper" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    
          <section class="calendar-section">
              <h2 class="section-title">ปฏิทินการใช้รถยนต์</h2>
              <div id="calendar-full"></div>
          </section>

          <section class="timeline-section" style="margin-top: 30px; background: white; padding: 20px; border-radius: 15px;">
              <div id="calendar-timeline"></div>
          </section>

       </div>
    <script src="main.js"></script>
    <script src="car-status.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
